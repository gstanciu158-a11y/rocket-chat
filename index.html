<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket · Mind in Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14; --card: #1a1a2e; --border: #2a2a45;
    --accent: #7c6bff; --accent2: #c084fc; --text: #e8e6f0;
    --muted: #8884a8; --user-bubble: #1e1b3a; --bot-bubble: #161624; --danger: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d) ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:var(--min-o);transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
  .nebula { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
  .nebula-1 { width:420px;height:420px;background:radial-gradient(circle,rgba(124,107,255,.14),transparent 70%);top:-110px;right:-110px; }
  .nebula-2 { width:320px;height:320px;background:radial-gradient(circle,rgba(192,132,252,.09),transparent 70%);bottom:40px;left:-90px; }

  header { position:relative; z-index:10; display:flex; align-items:center; gap:12px; padding:13px 18px; border-bottom:1px solid var(--border); background:rgba(13,13,20,.92); backdrop-filter:blur(14px); }
  .avatar { width:42px; height:42px; border-radius:50%; border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--card); flex-shrink:0; box-shadow:0 0 18px rgba(124,107,255,.35); }
  .header-info { flex:1; min-width:0; }
  .header-name { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; }
  .header-sub { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
  .header-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .reset-btn { display:flex; align-items:center; gap:5px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.06em; padding:5px 11px; border-radius:16px; cursor:pointer; transition:all .2s; }
  .reset-btn:hover { border-color:var(--danger); color:var(--danger); background:rgba(248,113,113,.07); }
  .reset-btn svg { width:11px; height:11px; fill:currentColor; flex-shrink:0; }
  .status-dot { width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }

  .messages { flex:1; overflow-y:auto; padding:20px 14px 8px; display:flex; flex-direction:column; gap:14px; position:relative; z-index:5; scroll-behavior:smooth; }
  .messages::-webkit-scrollbar{width:3px}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .msg { display:flex; gap:10px; max-width:88%; animation:fadeUp .3s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg.bot  { align-self:flex-start; }
  .msg-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; margin-top:4px; }
  .msg.bot  .msg-avatar { background:var(--card); border:1px solid var(--border); }
  .msg.user .msg-avatar { background:var(--user-bubble); border:1px solid var(--accent); }
  .bubble { padding:11px 15px; border-radius:18px; font-size:13.5px; line-height:1.7; max-width:100%; word-break:break-word; }
  .msg.bot  .bubble { background:var(--bot-bubble); border:1px solid var(--border); border-top-left-radius:4px; }
  .msg.user .bubble { background:var(--user-bubble); border:1px solid rgba(124,107,255,.35); border-top-right-radius:4px; }

  .typing .bubble { display:flex; gap:5px; align-items:center; padding:14px 18px; }
  .dot { width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:.15s} .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  .sugg-block { align-self:flex-start; display:flex; flex-direction:column; gap:7px; padding-left:40px; animation:fadeUp .35s ease both; max-width:100%; }
  .sugg-main-row, .sugg-extra-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .sugg-extra-row { display:none; }
  .sugg-extra-row.open { display:flex; }
  .suggestion-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:11.5px; padding:6px 13px; border-radius:20px; cursor:pointer; transition:all .2s; white-space:nowrap; }
  .suggestion-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(124,107,255,.08); }
  .show-more-btn { background:transparent; border:1px dashed var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.06em; padding:6px 12px; border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:4px; transition:all .2s; white-space:nowrap; }
  .show-more-btn:hover { border-color:var(--accent2); color:var(--accent2); }
  .arrow { transition:transform .3s; display:inline-block; }
  .show-more-btn.expanded .arrow { transform:rotate(180deg); }

  .input-area { position:relative; z-index:10; display:flex; align-items:center; gap:10px; padding:12px 14px; border-top:1px solid var(--border); background:rgba(13,13,20,.93); backdrop-filter:blur(14px); }
  #userInput { flex:1; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:10px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13.5px; outline:none; transition:border-color .2s; resize:none; max-height:90px; line-height:1.5; }
  #userInput:focus { border-color:var(--accent); }
  #userInput::placeholder { color:var(--muted); }
  #sendBtn { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform .15s,box-shadow .15s; box-shadow:0 0 14px rgba(124,107,255,.3); }
  #sendBtn:hover { transform:scale(1.08); box-shadow:0 0 22px rgba(124,107,255,.5); }
  #sendBtn:active { transform:scale(.95); }
  #sendBtn:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
  #sendBtn svg { width:17px; height:17px; fill:white; }

  .welcome-chip { display:inline-block; background:rgba(124,107,255,.12); border:1px solid rgba(124,107,255,.25); color:var(--accent2); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:3px 10px; border-radius:12px; margin-bottom:8px; }

  .modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px 28px; max-width:320px; width:90%; animation:fadeUp .25s ease; text-align:center; }
  .modal h3 { font-family:'Playfair Display',serif; font-size:16px; margin-bottom:8px; }
  .modal p  { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:20px; }
  .modal-btns { display:flex; gap:10px; justify-content:center; }
  .modal-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 20px; border-radius:20px; cursor:pointer; transition:all .2s; }
  .modal-cancel:hover { border-color:var(--text); color:var(--text); }
  .modal-confirm { background:var(--danger); border:none; color:white; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; padding:8px 20px; border-radius:20px; cursor:pointer; transition:opacity .2s; }
  .modal-confirm:hover { opacity:.85; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<header>
  <div class="avatar">🚀</div>
  <div class="header-info">
    <div class="header-name">Rocket</div>
    <div class="header-sub">Mind in Progress · Asistent digital</div>
  </div>
  <div class="header-actions">
    <button class="reset-btn" onclick="showResetModal()">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4C7.58 4 4 7.58 4 12s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      resetează
    </button>
    <div class="status-dot"></div>
  </div>
</header>

<div class="messages" id="messages"></div>

<div class="input-area">
  <textarea id="userInput" rows="1" placeholder="Scrie o întrebare despre Raisa..."></textarea>
  <button id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Resetezi conversația?</h3>
    <p>Toate mesajele vor fi șterse și Rocket va uita ce ați discutat până acum.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideResetModal()">Anulează</button>
      <button class="modal-confirm" onclick="resetConversation()">Da, resetează</button>
    </div>
  </div>
</div>

<script>
// ── Stars ──────────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 90; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--min-o:${(Math.random()*.3+.1).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(1)}s`;
  starsEl.appendChild(s);
}

// ── Config ─────────────────────────────────────────────────
const SYSTEM_PROMPT = `Ești Rocket, asistentul digital al site-ului "Mind in Progress", creat de Raisa Stanciu.
Răspunde ÎNTOTDEAUNA în limba română, cu un ton cald, autentic și prietenos.

DATE DESPRE RAISA:
• Elevă la Colegiul Național „Gheorghe Vrănceanu", clasa a 10-a D
• Pasiuni: lectură (cărți care provoacă gândirea critică și empatia), muzică (rock alternativ, pop punk), cântă la chitară, Qwan Ki Do (artă marțială — disciplină, răbdare, calm), scris, conexiuni interdisciplinare
• Voluntariat: Fundația de Sprijin Comunitar (FSC) — activități pentru copii și persoane vulnerabile, departamentele "atelier" și "mentori pentru viitor"; școală de vară 2025 la Godinești
• Aspirații: carieră care îmbină disciplina, responsabilitatea și creativitatea; interese în fizică, astronomie, biologie, informatică; impact pozitiv în comunitate
• Proiect Erasmus 4IT: participare pentru a vedea cum se aplică competențele digitale în contexte reale, colaborare internațională, comunicare interculturală
• Valori: autenticitate, curiozitate, perseverență, gândire critică, responsabilitate, empatie, autodisciplină
• A creat site-ul "Mind in Progress" pentru a-și împărtăși identitatea, valorile și pasiunile

Răspunde concis (2-4 propoziții), cald și inspirat. Dacă nu știi ceva specific, spune că informația nu este disponibilă pe site.`;

const SUGG_MAIN = [
  { label: '👤 Cine este Raisa?', q: 'Cine este Raisa?' },
  { label: '🎸 Pasiunile ei',      q: 'Care sunt pasiunile Raisei?' },
  { label: '🤝 Voluntariat',       q: 'Ce voluntariat face Raisa?' },
];
const SUGG_EXTRA = [
  { label: '⭐ Valorile ei',  q: 'Care sunt valorile Raisei?' },
  { label: '🌌 Aspirații',    q: 'Ce aspirații are Raisa?' },
  { label: '💡 Despre site',  q: 'De ce a creat Raisa acest site?' },
  { label: '🌍 Erasmus 4IT', q: 'Ce este proiectul Erasmus 4IT?' },
  { label: '🎵 Muzică',       q: 'Ce muzică îi place Raisei?' },
  { label: '🥋 Qwan Ki Do',  q: 'Ce artă marțială practică Raisa?' },
];

// ── State ──────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('userInput');
const sendBtn    = document.getElementById('sendBtn');
let history      = [];
let isBusy       = false;

// ── Utils ──────────────────────────────────────────────────
const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = t => esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');

function addMessage(role, html, isTyping = false) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}${isTyping ? ' typing' : ''}`;
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'bot' ? '🚀' : '✦';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = isTyping
    ? '<div class="dot"></div><div class="dot"></div><div class="dot"></div>'
    : html;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return { wrap, bubble };
}

function addSuggestions() {
  const block = document.createElement('div');
  block.className = 'sugg-block';

  const mainRow = document.createElement('div');
  mainRow.className = 'sugg-main-row';
  SUGG_MAIN.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'suggestion-btn';
    btn.textContent = s.label;
    btn.onclick = () => sendQuick(s.q);
    mainRow.appendChild(btn);
  });

  const moreBtn = document.createElement('button');
  moreBtn.className = 'show-more-btn';
  moreBtn.innerHTML = '<span class="more-label">mai multe</span><span class="arrow">▾</span>';

  const extraRow = document.createElement('div');
  extraRow.className = 'sugg-extra-row';
  SUGG_EXTRA.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'suggestion-btn';
    btn.textContent = s.label;
    btn.onclick = () => sendQuick(s.q);
    extraRow.appendChild(btn);
  });

  moreBtn.onclick = () => {
    const open = extraRow.classList.toggle('open');
    moreBtn.classList.toggle('expanded', open);
    moreBtn.querySelector('.more-label').textContent = open ? 'mai puține' : 'mai multe';
  };

  mainRow.appendChild(moreBtn);
  block.appendChild(mainRow);
  block.appendChild(extraRow);
  messagesEl.appendChild(block);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Send ───────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isBusy) return;

  document.querySelectorAll('.sugg-block').forEach(el => el.remove());
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isBusy = true;
  sendBtn.disabled = true;

  addMessage('user', esc(text));
  history.push({ role: 'user', content: text });

  const typing = addMessage('bot', '', true);

  try {
    // ✅ Calls /api/chat (Vercel proxy) — NOT api.anthropic.com directly
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    typing.wrap.remove();

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data?.content?.[0]?.text;

    if (!reply) throw new Error('Răspuns gol de la server.');

    addMessage('bot', fmt(reply));
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    typing.wrap?.remove?.();
    addMessage('bot', `⚠️ ${err.message || 'Eroare de conexiune. Încearcă din nou.'}`);
  }

  setTimeout(() => addSuggestions(), 200);
  isBusy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function sendQuick(text) {
  inputEl.value = text;
  sendMessage();
}

// ── Keyboard ───────────────────────────────────────────────
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 90) + 'px';
});

// ── Reset ──────────────────────────────────────────────────
function showResetModal() { document.getElementById('modalOverlay').classList.add('show'); }
function hideResetModal()  { document.getElementById('modalOverlay').classList.remove('show'); }
function resetConversation() {
  hideResetModal();
  history = [];
  messagesEl.innerHTML = '';
  setTimeout(showWelcome, 200);
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) hideResetModal();
});

// ── Welcome ────────────────────────────────────────────────
function showWelcome() {
  const html = `<span class="welcome-chip">rocket · mind in progress</span><br>Bună! 👋 Sunt <strong>Rocket</strong>, asistentul digital al <em>"Mind in Progress"</em>.<br><br>Aici găsești toate informațiile despre Raisa. Alege o sugestie sau scrie o întrebare!`;
  addMessage('bot', html);
  setTimeout(() => addSuggestions(), 300);
}

setTimeout(showWelcome, 400);
</script>
</body>
</html>
